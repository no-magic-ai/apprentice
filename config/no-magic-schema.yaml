# Convention schema for the no-magic repository.
# Artifacts generated by apprentice must conform to this schema.
# Update this file when no-magic conventions change.

schema_version: "2.0.0"

algorithm_structure:
  directory_pattern: "{tier_dir}/micro{snake_case_name}.py"
  implementation_file: "micro{snake_case_name}.py"
  instrumented_file: "micro{snake_case_name}_instrumented.py"
  manim_file: "scene_micro{snake_case_name}.py"
  anki_file: "micro{snake_case_name}_cards.csv"
  readme_file: "README.md"

  tier_mapping:
    1: "01-foundations"
    2: "02-alignment"
    3: "03-systems"
    4: "04-agents"

  naming:
    prefix: "micro"
    format: "snake_case"
    max_length: 64

  required_docstring_sections:
    - summary
    - args
    - returns
    - complexity
    - references

  style_rules:
    max_line_length: 100
    type_hint_policy: "all_public_functions"
    docstring_format: "google"
    external_dependencies: "none"  # stdlib only

viz_repo:
  scenes_dir: "scenes"
  scene_file: "scene_micro{snake_case_name}.py"
  previews_dir: "previews"
  preview_file: "micro{snake_case_name}.gif"

instrumentation:
  trace_format: "json"
  required_keys:
    - step
    - operation
    - state
  output_method: "structured_log"

anki:
  export_format: "csv"
  card_types:
    - concept
    - complexity
    - implementation
    - comparison
  required_fields:
    - front
    - back
    - tags
    - type

metadata:
  required_fields:
    - name
    - tier
    - complexity_time
    - complexity_space
    - prerequisites
