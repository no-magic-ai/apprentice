# Convention schema for the no-magic repository.
# Artifacts generated by apprentice must conform to this schema.
# Update this file when no-magic conventions change.

schema_version: "1.0.0"

algorithm_structure:
  directory_pattern: "algorithms/tier-{tier}/{snake_case_name}/"
  implementation_file: "{snake_case_name}.py"
  instrumented_file: "{snake_case_name}_instrumented.py"
  manim_file: "{snake_case_name}_scene.py"
  anki_file: "{snake_case_name}_cards.csv"
  readme_file: "README.md"

  required_docstring_sections:
    - summary
    - args
    - returns
    - complexity
    - references

  style_rules:
    max_line_length: 100
    type_hint_policy: "all_public_functions"
    docstring_format: "google"
    external_dependencies: "none"  # stdlib only

instrumentation:
  trace_format: "json"
  required_keys:
    - step
    - operation
    - state
  output_method: "structured_log"

anki:
  export_format: "csv"
  card_types:
    - concept
    - complexity
    - implementation
    - comparison
  required_fields:
    - front
    - back
    - tags
    - type

metadata:
  required_fields:
    - name
    - tier
    - complexity_time
    - complexity_space
    - prerequisites
